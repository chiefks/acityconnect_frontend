<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Listing — ACITY CONNECT</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app">
  <div style="max-width:680px; margin:0 auto;">
    <button class="btn btn-ghost btn-sm" onclick="history.back()" style="margin-bottom:16px;">← Back</button>
    <div class="card" id="form-container">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  if (!requireAuth()) throw new Error();
  buildLayout('Edit Listing');

  const params = new URLSearchParams(window.location.search);
  const listingId = params.get('id');
  let tags = [];

  async function loadListing() {
    const res = await api.getListing(listingId);
    if (!res.ok) {
      document.getElementById('form-container').innerHTML = `<div class="alert alert-danger">${res.data.message}</div>`;
      return;
    }
    const l = res.data.listing;
    if (l.user_id !== api.getUser().id) {
      document.getElementById('form-container').innerHTML = `<div class="alert alert-danger">You don't own this listing.</div>`;
      return;
    }
    tags = l.tags || [];
    renderForm(l);
  }

  function renderForm(l) {
    document.getElementById('form-container').innerHTML = `
      <h2 style="font-size:20px;font-weight:700;margin-bottom:6px;">Edit Listing</h2>
      <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px;">
        Editing will require re-approval by admin before going live again.
      </p>
      <div id="alert-box"></div>

      <div class="form-group">
        <label class="form-label">Title *</label>
        <input id="title" class="form-control" value="${l.title}" />
      </div>

      <div class="form-group">
        <label class="form-label">Description *</label>
        <textarea id="description" class="form-control" rows="5">${l.description}</textarea>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="category" class="form-control">
            <option value="item" ${l.category==='item'?'selected':''}>Item</option>
            <option value="skill" ${l.category==='skill'?'selected':''}>Skill</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="status" class="form-control">
            <option value="available" ${l.status==='available'?'selected':''}>Available</option>
            <option value="sold" ${l.status==='sold'?'selected':''}>Sold</option>
            <option value="swapped" ${l.status==='swapped'?'selected':''}>Swapped</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Price (GH₵) — Leave blank for free/exchange</label>
        <input id="price" type="number" class="form-control" value="${l.price||''}" min="0" step="0.01" />
      </div>

      <div class="form-group">
        <label class="form-label">Tags (press Enter to add)</label>
        <input id="tag-input" class="form-control" placeholder="Add a tag..."
               onkeydown="addTag(event)" />
        <div id="tags-display" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;"></div>
      </div>

      <div class="flex gap-3" style="justify-content:flex-end;margin-top:8px;">
        <button class="btn btn-ghost" onclick="navigate('my-listings.html')">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()" id="save-btn">Save Changes</button>
      </div>`;

    renderTags();
  }

  function addTag(e) {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !tags.includes(val)) { tags.push(val); renderTags(); }
    e.target.value = '';
  }

  function removeTag(t) { tags = tags.filter(x => x !== t); renderTags(); }

  function renderTags() {
    document.getElementById('tags-display').innerHTML = tags.map(t => `
      <span style="display:inline-flex;align-items:center;gap:5px;background:var(--bg);
                   border:1px solid var(--border);padding:3px 10px;border-radius:999px;font-size:12px;">
        ${t} <button onclick="removeTag('${t}')" type="button"
          style="border:none;background:none;cursor:pointer;font-size:14px;color:var(--text-muted);">×</button>
      </span>`).join('');
  }

  async function saveEdit() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Saving...';

    const price = document.getElementById('price').value;
    const res = await api.updateListing(listingId, {
      title:       document.getElementById('title').value.trim(),
      description: document.getElementById('description').value.trim(),
      category:    document.getElementById('category').value,
      status:      document.getElementById('status').value,
      price:       price ? parseFloat(price) : null,
      tags,
    });

    if (res.ok) {
      showAlert(document.getElementById('alert-box'), 'success', 'Listing updated! Pending re-approval.');
      setTimeout(() => navigate('my-listings.html'), 1500);
    } else {
      showAlert(document.getElementById('alert-box'), 'danger', res.data.message);
      btn.disabled = false; btn.textContent = 'Save Changes';
    }
  }

  loadListing();
</script>
</body>
</html>
