<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — ACITY CONNECT</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app">
  <div id="alert-box" style="margin-bottom:12px;"></div>

  <!-- Stats Cards -->
  <div class="grid-4 mb-4" id="admin-stats">
    <div class="loading-overlay" style="grid-column:1/-1;min-height:80px;"><div class="spinner"></div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(this,'pending')">⏳ Pending Listings</button>
    <button class="tab-btn" onclick="switchTab(this,'approved')">✅ Approved</button>
    <button class="tab-btn" onclick="switchTab(this,'flagged')">🚫 Flagged</button>
    <button class="tab-btn" onclick="switchTab(this,'users')">👥 Users</button>
  </div>

  <div id="admin-content">
    <div class="loading-overlay"><div class="spinner"></div></div>
  </div>
</div>

<!-- Reject Modal -->
<div class="modal-overlay hidden" id="reject-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Reject Listing</span>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Reason for rejection</label>
        <textarea id="reject-reason" class="form-control" rows="3"
          placeholder="e.g. Inappropriate content, spam, missing info..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmReject()">Reject & Notify User</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  if (!requireAuth()) throw new Error();
  if (!requireAdmin()) throw new Error();
  buildLayout('Admin Panel');

  let currentTab = 'pending';
  let rejectListingId = null;

  async function loadStats() {
    const res = await api.adminStats();
    if (!res.ok) return;
    const s = res.data.stats;

    document.getElementById('admin-stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon" style="background:#E8F5E9;">👥</div>
        <div><div class="stat-value">${s.total_students}</div><div class="stat-label">Students</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#E3F2FD;">📋</div>
        <div><div class="stat-value">${s.total_listings}</div><div class="stat-label">Total Listings</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#FFF3E0;">⏳</div>
        <div>
          <div class="stat-value" style="color:${s.pending_approvals>0?'var(--warning)':'inherit'};">${s.pending_approvals}</div>
          <div class="stat-label">Pending Approval</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#F3E5F5;">🤝</div>
        <div><div class="stat-value">${s.total_interactions}</div><div class="stat-label">Interactions</div></div>
      </div>`;
  }

  function switchTab(el, tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentTab = tab;
    loadTab();
  }

  async function loadTab() {
    const container = document.getElementById('admin-content');
    container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';

    if (currentTab === 'users') {
      await loadUsers();
    } else {
      await loadListings(currentTab);
    }
  }

  async function loadListings(status) {
    const res = await api.adminGetListings(status);
    const container = document.getElementById('admin-content');

    if (!res.ok) {
      container.innerHTML = `<div class="alert alert-danger">${res.data.message}</div>`;
      return;
    }

    const listings = res.data.listings;
    if (listings.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${status==='pending'?'⏳':status==='flagged'?'🚫':'✅'}</div>
          <h3>No ${status} listings</h3>
        </div>`;
      return;
    }

    container.innerHTML = `
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Listing</th>
              <th>Category</th>
              <th>Posted By</th>
              <th>Date</th>
              ${status === 'flagged' ? '<th>Reason</th>' : ''}
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${listings.map(l => `
              <tr>
                <td>
                  <div style="font-weight:600;">${l.title}</div>
                  <div class="text-xs text-muted">${l.description.substring(0,60)}...</div>
                  <a href="listing-detail.html?id=${l.id}" style="font-size:12px;color:var(--primary);">View listing →</a>
                </td>
                <td><span class="badge badge-${l.category}">${l.category}</span></td>
                <td>
                  <div style="font-weight:500;">${l.full_name}</div>
                  <div class="text-xs text-muted">${l.email}</div>
                </td>
                <td class="text-sm text-muted">${timeAgo(l.created_at)}</td>
                ${status === 'flagged' ? `<td class="text-sm text-muted">${l.flag_reason||'—'}</td>` : ''}
                <td>
                  <div class="flex gap-2">
                    ${status !== 'approved' ? `
                      <button class="btn btn-primary btn-sm" onclick="approve(${l.id})">✅ Approve</button>
                    ` : ''}
                    ${status !== 'flagged' ? `
                      <button class="btn btn-ghost btn-sm" onclick="openReject(${l.id})">🚫 Reject</button>
                    ` : `
                      <button class="btn btn-primary btn-sm" onclick="approve(${l.id})">✅ Restore</button>
                    `}
                    <button class="btn btn-danger btn-sm" onclick="deleteL(${l.id})">🗑️</button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  async function loadUsers() {
    const res = await api.adminGetUsers();
    const container = document.getElementById('admin-content');

    if (!res.ok) { container.innerHTML = `<div class="alert alert-danger">${res.data.message}</div>`; return; }

    const users = res.data.users;
    container.innerHTML = `
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>Department</th>
              <th>Listings</th>
              <th>Joined</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td>
                  <div class="flex items-center gap-2">
                    <div class="avatar avatar-sm">${avatarInitials(u.full_name)}</div>
                    <div>
                      <div style="font-weight:500;">${u.full_name}</div>
                      <div class="text-xs text-muted">${u.email}</div>
                    </div>
                  </div>
                </td>
                <td><span class="badge ${u.role==='admin'?'badge-admin':'badge-available'}">${u.role}</span></td>
                <td class="text-sm">${u.department||'—'}</td>
                <td class="text-sm">${u.listing_count}</td>
                <td class="text-sm text-muted">${timeAgo(u.created_at)}</td>
                <td>
                  <span class="badge ${u.is_active?'badge-available':'badge-sold'}">
                    ${u.is_active?'Active':'Inactive'}
                  </span>
                </td>
                <td>
                  ${u.role !== 'admin' ? `
                    <button class="btn btn-sm ${u.is_active?'btn-ghost':'btn-outline'}"
                      onclick="${u.is_active?'deactivate':'activate'}(${u.id})">
                      ${u.is_active ? '🚫 Deactivate' : '✅ Activate'}
                    </button>` : '<span class="text-muted text-sm">—</span>'}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  async function approve(id) {
    const res = await api.adminApprove(id);
    if (res.ok) { showAlert(document.getElementById('alert-box'),'success','Listing approved and is now live!'); loadTab(); loadStats(); }
    else showAlert(document.getElementById('alert-box'),'danger',res.data.message);
  }

  function openReject(id) {
    rejectListingId = id;
    document.getElementById('reject-reason').value = '';
    document.getElementById('reject-modal').classList.remove('hidden');
  }

  function closeModal() { document.getElementById('reject-modal').classList.add('hidden'); }

  async function confirmReject() {
    const reason = document.getElementById('reject-reason').value.trim();
    const res = await api.adminReject(rejectListingId, reason || 'Violates community guidelines');
    closeModal();
    if (res.ok) { showAlert(document.getElementById('alert-box'),'success','Listing rejected. User has been notified.'); loadTab(); loadStats(); }
    else showAlert(document.getElementById('alert-box'),'danger',res.data.message);
  }

  async function deleteL(id) {
    if (!confirm('Permanently delete this listing? This cannot be undone.')) return;
    const res = await api.adminDeleteListing(id);
    if (res.ok) { showAlert(document.getElementById('alert-box'),'success','Listing deleted.'); loadTab(); loadStats(); }
  }

  async function deactivate(id) {
    if (!confirm('Deactivate this user account?')) return;
    const res = await api.adminDeactivate(id);
    if (res.ok) { showAlert(document.getElementById('alert-box'),'success','User deactivated.'); loadTab(); }
  }

  async function activate(id) {
    const res = await api.adminActivate(id);
    if (res.ok) { showAlert(document.getElementById('alert-box'),'success','User reactivated.'); loadTab(); }
  }

  loadStats();
  loadTab();
</script>
</body>
</html>
