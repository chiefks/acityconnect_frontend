<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — ACITY CONNECT</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app">
  <div class="flex items-center justify-between mb-4">
    <span id="unread-count" style="font-size:14px;color:var(--text-muted);"></span>
    <button class="btn btn-outline btn-sm" onclick="markAllRead()">✅ Mark All Read</button>
  </div>

  <div id="notif-container">
    <div class="loading-overlay"><div class="spinner"></div></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  if (!requireAuth()) throw new Error();
  buildLayout('Notifications');

  const icons = {
    new_interest: '🤝', new_message: '💬',
    listing_approved: '✅', listing_rejected: '❌',
    interaction_accepted: '🎉', interaction_rejected: '😔', interaction_completed: '🏁',
  };

  async function loadNotifications() {
    const res = await api.getNotifications();
    const container = document.getElementById('notif-container');

    if (!res.ok) { container.innerHTML = '<div class="alert alert-danger">Failed to load.</div>'; return; }

    const { notifications, unread_count } = res.data;
    document.getElementById('unread-count').textContent =
      unread_count > 0 ? `${unread_count} unread notification${unread_count > 1 ? 's' : ''}` : 'All caught up!';

    if (notifications.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔔</div>
          <h3>No notifications yet</h3>
          <p>You'll be notified when someone is interested in your listings or messages you.</p>
        </div>`;
      return;
    }

    container.innerHTML = notifications.map(n => `
      <div class="card" style="margin-bottom:10px;cursor:pointer;
           border-left:3px solid ${n.is_read ? 'transparent' : 'var(--primary)'};
           background:${n.is_read ? 'var(--bg-card)' : '#f0f7f4'};"
           onclick="readAndNavigate(${n.id}, '${n.reference_type}', ${n.reference_id || null})">
        <div class="flex items-center gap-3">
          <div style="font-size:28px;">${icons[n.type] || '🔔'}</div>
          <div style="flex:1;">
            <div style="font-weight:${n.is_read ? '400' : '600'}; font-size:14px;">${n.title}</div>
            ${n.body ? `<div class="text-sm text-muted">${n.body}</div>` : ''}
            <div class="text-xs text-muted mt-1">${timeAgo(n.created_at)}</div>
          </div>
          ${!n.is_read ? `<div style="width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;"></div>` : ''}
        </div>
      </div>`).join('');
  }

  async function readAndNavigate(id, type, refId) {
    await api.markOneRead(id);
    if (type === 'listing' && refId) navigate('listing-detail.html?id=' + refId);
    else if (type === 'interaction') navigate('interactions.html');
    else if (type === 'message') navigate('messages.html');
    else loadNotifications();
  }

  async function markAllRead() {
    await api.markAllRead();
    loadNotifications();
    loadNotifCount();
  }

  loadNotifications();
</script>
</body>
</html>
